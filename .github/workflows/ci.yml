name: CI and Cloudflare Deploy

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-ci:
    name: App CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docsyra_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docsyra_app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  collab-ci:
    name: Collaboration Worker CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docsyra-collab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docsyra-collab/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build